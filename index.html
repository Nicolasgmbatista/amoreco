<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quer dar o caneco pra mim?</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 2rem;
            animation: pulse 2s infinite;
        }

        .buttons {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        button {
            padding: 18px 45px;
            font-size: 1.4rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        #sim {
            background: #ff4d94;
            color: white;
        }

        #sim:hover {
            background: #ff3385;
            transform: scale(1.15);
        }

        #nao {
            background: #666;
            color: white;
            position: absolute;
            transition: all 0.4s ease;
        }

        #nao:hover {
            background: #444;
        }

        .heart {
            position: absolute;
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.6);
            animation: float 15s linear infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-content h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #ff4d94;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Quer dar o caneco pra mim?</h1>
        
        <div class="buttons">
            <button id="sim">Sim ❤️</button>
            <button id="nao">Não 😢</button>
        </div>
    </div>

    <!-- Modal de sucesso -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2>Eu te amo demais!</h2>
            <p style="font-size: 1.4rem; margin: 20px 0; color: #555;">
                Você acabou de fazer o homem mais feliz do mundo.<br>
                Mal posso esperar para usar seu caneco ❤️
            </p>
            <button onclick="location.reload()" style="background:#ff4d94; color:white; padding:15px 30px; border:none; border-radius:50px; font-size:1.2rem; cursor:pointer;">
                Ver de novo
            </button>
        </div>
    </div>

    <script>
        const botaoNao = document.getElementById('nao');
        const botaoSim = document.getElementById('sim');
        const modal = document.getElementById('modal');

        // Função que faz o botão "Não" fugir
        function fuja() {
            const largura = window.innerWidth;
            const altura = window.innerHeight;
            
            const larguraBotao = botaoNao.offsetWidth;
            const alturaBotao = botaoNao.offsetHeight;

            // Gera posição aleatória dentro da tela (com margem)
            const maxX = largura - larguraBotao - 50;
            const maxY = altura - alturaBotao - 50;

            const novoX = Math.random() * maxX;
            const novoY = Math.random() * maxY;

            botaoNao.style.left = `${novoX}px`;
            botaoNao.style.top = `${novoY}px`;
        }

        // Evento ao passar o mouse no botão Não
        botaoNao.addEventListener('mouseenter', fuja);
        botaoNao.addEventListener('click', fuja); // segurança extra

        // Clique no botão Sim
        botaoSim.addEventListener('click', () => {
            modal.style.display = 'flex';
        });

        // Cria corações flutuantes no fundo
        function criarCoracao() {
            const coracao = document.createElement('div');
            coracao.classList.add('heart');
            coracao.textContent = ['❤️', '💕', '💖', '💗'][Math.floor(Math.random() * 4)];
            
            coracao.style.left = Math.random() * 100 + 'vw';
            coracao.style.animationDuration = (Math.random() * 10 + 10) + 's';
            coracao.style.opacity = Math.random() * 0.6 + 0.4;
            
            document.body.appendChild(coracao);

            // Remove o coração depois que ele sai da tela
            setTimeout(() => {
                coracao.remove();
            }, 25000);
        }

        // Cria corações a cada 400ms
        setInterval(criarCoracao, 400);

        // Posiciona inicialmente o botão "Não" no centro
        window.addEventListener('load', () => {
            botaoNao.style.position = 'absolute';
            fuja(); // já dá uma fugidinha inicial
        });
    </script>
</body>
</html>
